palette = "matugen"
format = """
[в–‘в–’в–“](shadow)\
$os\
[оӮ°](bg:primary fg:shadow)\
$directory\
[оӮ° ](fg:primary bg:surface_variant)\
$git_branch\
$git_status\
$hg_branch\
[оӮ° ](fg:surface_variant bg:shadow)\
[в–“в–’в–‘](shadow)\
[ в—ҰвҖў](outline)\
$fill\
[вҖўв—Ұ ](outline)\
[в–‘в–’в–“](shadow)\
[ оӮІ](fg:surface_variant bg:shadow)\
$status\
$cmd_duration\
[ оӮІ](fg:shadow bg:surface_variant)\
$battery\
[в–“в–’в–‘](shadow)
[В·](surface_variant)\
[В·](outline)\
[вҖў](on_surface_variant)\
[пғҡ ](tertiary)\
"""

[fill]
symbol = "В·"
style = "outline"

[directory]
style = "fg:surface_variant bg:primary"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"~" = " п“ў "
"Applications" = " пҗҺ "
"Desktop" = " п’© "
"Developer" = " о»ҝ "
"Documents" = " у°Ҳҷ "
"Downloads" = " пҖҷ "
"Games" = " п„ӣ "
"GitHub" = " п„“ "
"Library" = " пҶң "
"Movies" = " пҖҲ "
"Music" = " пҖҒ "
"Pictures" = " пҖҫ "
"Projects" = " пӮӯ "
"Public" = " оҲ“ "
"Screenshots" = " уұЈҙ "
"Videos" = " п”¬ "
"Thunderbird" = " п„Ў  "
"source" = " у°Ҳ№ "
"comm" = " пҚ° "

[git_branch]
symbol = "пҗҳ"
style = "bg:surface_variant"
format = '[[ $symbol $branch ](fg:primary bg:surface_variant)]($style)'

[git_status]
style = "bg:surface_variant"
format = '[[($all_status$ahead_behind )](fg:primary bg:surface_variant)]($style)'

[hg_branch]
disabled = false
symbol = "пҗҳ"
style = "bg:surface_variant"
format = '[[ $symbol $branch ](fg:primary bg:surface_variant)]($style)'

[cmd_duration]
disabled = false
min_time = 0
show_milliseconds = true
style = "fg:on_surface bg:surface_variant"
format = '[$duration]($style)'

[status]
symbol = ' пҒң '
success_symbol = ' пҒқ '
not_executable_symbol = ' п‘Ё '
not_found_symbol = ' п‘® '
map_symbol = true
disabled = false
style = 'fg:on_surface bg:surface_variant'
format = '[$symbol]($style)'

[os]
format = '[ $symbol]($style)'
style = 'fg:primary bg:shadow'
disabled = false

[os.symbols]
Arch = "пҢғ "
CachyOS = "пҢғ "
Debian = "пҢҶ "
Fedora = "пҢҠ "
FreeBSD = "пҢҢ "
Linux = "пҢҡ "
Macos = "оң‘ "
NixOS = "уұ„… "
Nobara = "пҺҖ "
Pop = "пҢӘ "
Raspbian = "пҢ• "
Ubuntu = "пҢӣ "
Unknown = "пғҙ "

[palettes.matugen]
error = '#fb4934'
hover = '#474240'
on_error = '#282828'
on_hover = '#fbf1c7'
on_primary = '#282828'
on_secondary = '#282828'
on_surface = '#fbf1c7'
on_surface_variant = '#ebdbb2'
on_tertiary = '#282828'
outline = '#786f6b'
primary = '#ebdbb2'
secondary = '#8ec07c'
shadow = '#282828'
surface = '#282828'
surface_variant = '#3c3836'
tertiary = '#83a598'
